# Сбор метрик FluxScope (§6 ТЗ): latency, error rate, polling lag, очередь алертов.
# Эндпоинт /api/v1/metrics защищается basic-auth или IP-allowlist (§8).

global:
  scrape_interval: 15s

scrape_configs:
  - job_name: fluxscope-api
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ["api:5049"]
