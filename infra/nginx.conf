# Reverse-proxy FluxScope: TLS + статика фронта + проксирование /api (§3.2, §10).
# Заглушка для Этапа 1. TLS (certbot/Let's Encrypt) и HSTS добавляются при деплое (§6, §9).

events {}

http {
    upstream fluxscope_api {
        server api:5049;
    }

    server {
        listen 80;
        server_name _;

        # API
        location /api/ {
            proxy_pass http://fluxscope_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # TODO(§10): статика собранного web/ (root /usr/share/nginx/html; try_files ... /index.html)
    }
}
