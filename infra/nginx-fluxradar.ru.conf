# Системный Nginx (хост) — публикация fluxradar.ru в интернет.
# Проксирует ВЕСЬ трафик домена на наш docker-контейнер fluxscope_web (127.0.0.1:8080),
# который уже отдаёт статику фронта + /api. Существующий bananagen.ru не затрагивается.
#
# Установка (требует sudo):
#   sudo cp infra/nginx-fluxradar.ru.conf /etc/nginx/sites-available/fluxradar.ru
#   sudo ln -s /etc/nginx/sites-available/fluxradar.ru /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Затем HTTPS (Let's Encrypt) — добавит TLS-блок автоматически:
#   sudo certbot --nginx -d fluxradar.ru -d www.fluxradar.ru

server {
    listen 80;
    listen [::]:80;
    server_name fluxradar.ru www.fluxradar.ru;

    # Весь трафик домена → наш контейнер (статика фронта + /api внутри него).
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
