# Фронт-nginx на хосте 192.168.10.23 (за роутером 77.34.77.179, порты 80/443).
# Проксирует fluxradar.ru на наш контейнер на сервере 192.168.10.32:8080
# (там Nginx отдаёт статику фронта + /api). bananagen.ru на .23 не затрагивается.
#
# Установка на .23:
#   scp на .23 → /etc/nginx/sites-available/fluxradar.ru → symlink → nginx -t → reload
#   certbot --nginx -d fluxradar.ru -d www.fluxradar.ru   (HTTPS)

server {
    listen 80;
    listen [::]:80;
    server_name fluxradar.ru www.fluxradar.ru;

    location / {
        proxy_pass http://192.168.10.32:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
