# Прод-режим (локальный запуск): Nginx отдаёт статику собранного web/dist
# и проксирует /api на api-бинарь, запущенный на хосте (§3.2, §10 ТЗ).
# TLS/HSTS/certbot добавляются при реальном деплое — здесь локальный HTTP.

events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Структурный access-log (§6) можно расширить позже; здесь — стандартный.
    access_log /var/log/nginx/access.log;

    # api запущен на хосте; из контейнера хост доступен как host.docker.internal
    # (для Linux это имя добавляется через extra_hosts в compose).
    upstream fluxscope_api {
        server host.docker.internal:5049;
    }

    # Базовый rate-limit на /api (§9): 60 req/min с IP, burst для всплесков.
    limit_req_zone $binary_remote_addr zone=api_rl:10m rate=1r/s;

    server {
        listen 80;
        server_name _;

        # Статика собранного фронта.
        root /usr/share/nginx/html;
        index index.html;

        # Хэшированные ассеты Vite — кэшируем агрессивно.
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # API → бинарь на хосте.
        location /api/ {
            limit_req zone=api_rl burst=60 nodelay;
            proxy_pass http://fluxscope_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SPA-fallback: любой не-API маршрут отдаёт index.html.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
