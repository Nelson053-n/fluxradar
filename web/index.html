    <script type="application/ld+json">
      {
        "@context": "https://schema.org",

          {

            "url": "https://fluxradar.ru/",

            "sameAs": ["https://github.com/Nelson053-n/fluxradar"]
          },
          {
            "@type": "SoftwareApplication",
            "name": "FluxRadar",
            "applicationCategory": "BusinessApplication",
            "operatingSystem": "Web",
            "url": "https://fluxradar.ru/",
            "description": "Публичный self-hosted мониторинг Flux-нод: дашборд флота по адресу кошелька, доходность с учётом Parallel Assets, калькулятор доходности и Telegram-алерты о статусе нод.",
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
          }
        ]
      }

    <script>
      // Анти-FOUC: ставим тему до рендера React, чтобы не было вспышки.
      (function () {
        try {
          var t = localStorage.getItem('fluxscope:theme');
          document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>

  <body>
    <noscript>
      <h1>FluxRadar — мониторинг Flux-нод</h1>
      <p>
        FluxRadar — публичный сервис мониторинга нод сети
        <a href="https://runonflux.io">Flux</a>. Введите публичный адрес кошелька
        (ZelID / t1… / t3…) и получите дашборд всего флота нод: тир (Cumulus / Nimbus /
        Stratus), статус, ранг в очереди выплат, время до выплаты, окно обслуживания,
        геолокацию, версию FluxOS и число приложений.
      </p>
      <p>
        Сервис оценивает доходность за день, месяц и год во FLUX и в долларах с учётом

        по PA-чейнам. Встроен калькулятор доходности и привязка Telegram-бота
        (@FluxRadar_bot) для алертов о падении нод — всё без регистрации.
      </p>
      <p>
        Открытый исходный код:
        <a href="https://github.com/Nelson053-n/fluxradar">github.com/Nelson053-n/fluxradar</a>.
        Для работы дашборда включите JavaScript.
      </p>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
